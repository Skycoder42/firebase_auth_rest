name: firebase_auth_rest
description: A platform independent Dart/Flutter Wrapper for the Firebase Authentication API based on REST
version: 2.1.4
homepage: https://github.com/Skycoder42/firebase_auth_rest

environment:
  sdk: ^3.12.0

dependencies:
  freezed_annotation: ^3.1.0
  http: ^1.6.0
  json_annotation: ^4.12.0

dev_dependencies:
  build_runner: ^2.15.0
  coverage: ^1.15.0
  dart_pre_commit: ^6.1.2
  dart_test_tools: ^7.2.2
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  meta: ^1.18.0
  mocktail: ^1.0.5
  test: ^1.31.0

dart_pre_commit:
  pull-up-dependencies:
    allowed:
      - meta
      - test
